version: '3.8'

services:
  # ============================================
  # MQTT Broker - Mosquitto
  # ============================================
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"    # MQTT
      - "9001:9001"    # MQTT WebSocket
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - iot-network

  # ============================================
  # MongoDB - Time Series Database
  # ============================================
  mongodb:
    image: mongo:7
    container_name: iot-mongodb
    entrypoint: >
      bash -c 'echo "U29tZVN1cGVyU2VjcmV0QmFzZTY0U3RyaW5nRm9yTW9uZ29EQlJlcGxpY2FTZXQxMjM0NTY3ODkw" > /opt/keyfile && chmod 400 /opt/keyfile && chown 999:999 /opt/keyfile && exec docker-entrypoint.sh mongod --replSet rs0 --keyFile /opt/keyfile'
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-iot_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-iot_mongo_2024}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-iot_smart_room}
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    networks:
      - iot-network

  # ============================================
  # Node-RED - Flow Automation
  # ============================================
  nodered:
    image: nodered/node-red:latest
    container_name: iot-nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    environment:
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - nodered_data:/data
    depends_on:
      - mosquitto
      - mongodb
    networks:
      - iot-network

volumes:
  mongodb_data:
    driver: local
  nodered_data:
    driver: local

networks:
  iot-network:
    driver: bridge
