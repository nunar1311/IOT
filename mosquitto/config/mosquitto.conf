# Mosquitto MQTT Broker Configuration
# ====================================

# Default listener (MQTT protocol)
listener 1883
protocol mqtt

# WebSocket listener (for web dashboard)
listener 9001
protocol websockets

# Allow anonymous connections (change in production)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type all
